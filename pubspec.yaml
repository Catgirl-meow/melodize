name: melodize
description: A lossless music player for Navidrome/Subsonic
publish_to: 'none'
version: 1.8.9+65

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Networking
  dio: ^5.4.3
  crypto: ^3.0.3          # MD5 auth for Subsonic API

  # Audio
  just_audio: ^0.9.40
  audio_service: ^0.18.0

  # Local database (offline cache + downloads)
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.3
  path: ^1.9.0

  # UI
  dynamic_color: ^1.7.0       # Material You wallpaper colors
  cached_network_image: ^3.3.1
  palette_generator: ^0.3.3+3  # Pull colors from album art
  flutter_staggered_animations: ^1.1.1

  # Utilities
  uuid: ^4.4.0
  intl: ^0.19.0
  rxdart: ^0.27.7
  connectivity_plus: ^6.0.3
  just_audio_media_kit: ^2.1.0
  media_kit_libs_linux: ^1.0.5
  dbus: ^0.7.12

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  drift_dev: ^2.18.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
